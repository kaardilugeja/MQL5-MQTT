name: Windows Public Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/windows-mql5-compile.yml'
      - 'Experts/MQTT/**'
      - 'Include/MQTT/**'
      - 'Scripts/MQTT/**'
      - 'Tools/compile-public-validation.ps1'

permissions:
  contents: read

jobs:
  validate-public-compile-automation:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify curated public validation targets
        shell: pwsh
        run: |
          $requiredPaths = @(
            'Tools/compile-public-validation.ps1'
            'Scripts/MQTT/Tools/compile-mql5.ps1'
            'Scripts/MQTT/Tools/Resolve-MT5Paths.ps1'
            'Scripts/MQTT/Tests/Unit/Protocol/TEST_MQTT.mq5'
            'Scripts/MQTT/Tests/Unit/Session/TEST_MqttClient.mq5'
            'Scripts/MQTT/Tests/Unit/Transport/TEST_Transport.mq5'
            'Scripts/MQTT/Tests/Unit/Queue/TEST_PublishQueue.mq5'
            'Experts/MQTT/Harnesses/PublishQueueTestHarness.mq5'
          )

          foreach ($relativePath in $requiredPaths) {
            if (-not (Test-Path -LiteralPath $relativePath)) {
              throw "Required validation file not found: $relativePath"
            }
          }

      - name: Parse PowerShell validation helpers
        shell: pwsh
        run: |
          $scripts = @(
            'Tools/compile-public-validation.ps1'
            'Scripts/MQTT/Tools/compile-mql5.ps1'
            'Scripts/MQTT/Tools/Resolve-MT5Paths.ps1'
          )

          foreach ($scriptPath in $scripts) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Join-Path $PWD $scriptPath),
              [ref]$tokens,
              [ref]$errors
            )

            if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                Write-Error ("{0}:{1}: {2}" -f $scriptPath, $_.Extent.StartLineNumber, $_.Message)
              }
              throw "PowerShell parse failed: $scriptPath"
            }
          }

      - name: Note full compile path
        shell: pwsh
        run: |
          Write-Host 'GitHub-hosted Windows runners do not include MetaEditor or an MT5 data root.'
          Write-Host 'Run .\Tools\compile-public-validation.ps1 locally on an MT5-enabled Windows machine for full compile validation.'
